# Deploy to VPS -- DRAFT
# Enable after first successful manual deployment.
# Required secrets: DEPLOY_HOST, DEPLOY_PORT, DEPLOY_USER, DEPLOY_SSH_KEY

name: Deploy

on:
  workflow_dispatch:
  # Uncomment after first manual deploy succeeds:
  # push:
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/T-Invest-trader
            git pull origin main
            docker compose build
            docker compose up -d
            docker compose ps

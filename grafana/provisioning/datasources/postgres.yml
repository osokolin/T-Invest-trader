apiVersion: 1

datasources:
  - name: Postgres
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: tinvest
    database: tinvest
    isDefault: true
    editable: false
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
      connMaxLifetime: 14400
      maxOpenConns: 25
      maxIdleConns: 5
    secureJsonData:
      password: ${POSTGRES_PASSWORD}

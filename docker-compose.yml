services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tinvest
      POSTGRES_USER: tinvest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tinvest_local}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinvest -d tinvest"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./runtime:/app/runtime

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - /etc/grafana/custom-entrypoint.sh
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tinvest_local}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/grafana/custom-entrypoint.sh:/etc/grafana/custom-entrypoint.sh:ro

volumes:
  pgdata:
  grafana-data:
